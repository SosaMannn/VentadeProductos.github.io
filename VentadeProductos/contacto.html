<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto - RunPro Store</title>

</head>

<body>

<header>
<h1>Contacto</h1>
<nav>
<a href="index.html">Inicio</a>
<a href="productos.html">Productos</a>
<a href="#">🛒 Carrito (<span id="contador">0</span>)</a>
</nav>
</header>

<main>
<h2>Formulario de Contacto</h2>

<form>
<label>Nombre:</label>
<input type="text" name="nombre" required>

<label>Email:</label>
<input type="email" name="email" required>

<label>Tipo de consulta:</label>
<select name="consulta">
<option>Información producto</option>
<option>Pedido</option>
<option>Devolución</option>
</select>

<label>Sexo:</label>
<input type="radio" name="sexo" value="hombre"> Hombre
<input type="radio" name="sexo" value="mujer"> Mujer

<label><input type="checkbox" name="privacidad" required> Acepto la política de privacidad</label>

<input type="submit" value="Enviar" class="boton">
</form>
</main>

<footer>
<p>© 2026 RunPro Store</p>
</footer>

<script src="js/carrito.js"></script>
</body>
</html>
